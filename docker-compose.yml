services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      # Mount source and public for live editing without rebuild
      - ./src:/app/src
      - ./public:/app/public
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      - CHOKIDAR_USEPOLLING=true  # Reliable file watching in Docker
