services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      # Mount source and public for live editing without rebuild
      - ./src:/app/src
      - ./public:/app/public
      - ./tokens:/app/tokens
      - ./locales:/app/locales
      - ./scripts:/app/scripts
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      - CHOKIDAR_USEPOLLING=true  # Reliable file watching in Docker
    # Regenerate tokens/locales on start so output lands in bind-mounted src/
    command: sh -c "npm run tokens && npm run locales && npm run dev -- --host 0.0.0.0"