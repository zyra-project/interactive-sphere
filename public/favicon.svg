<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="sphere" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="16" cy="16" r="14.08"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14.72" fill="#0a1628"/>
  <!-- Globe body -->
  <circle cx="16" cy="16" r="14.08" fill="url(#sphere)"/>
  <!-- Grid lines (meridians & parallels) -->
  <g clip-path="url(#clip)" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <!-- Equator -->
    <ellipse cx="16" cy="16" rx="14.08" ry="1.92"/>
    <!-- Parallels -->
    <ellipse cx="16" cy="10.56" rx="11.2" ry="1.6"/>
    <ellipse cx="16" cy="21.44" rx="11.2" ry="1.6"/>
    <!-- Central meridian -->
    <ellipse cx="16" cy="16" rx="1.92" ry="14.08"/>
    <!-- Side meridians -->
    <ellipse cx="11.84" cy="16" rx="1.28" ry="13.44"/>
    <ellipse cx="20.16" cy="16" rx="1.28" ry="13.44"/>
  </g>
  <!-- Simplified land masses -->
  <g clip-path="url(#clip)" fill="rgba(76,175,80,0.5)" stroke="none">
    <!-- Americas-like shape -->
    <path d="M12.16 7.04 Q13.44 8 12.8 10.24 Q11.52 11.52 12.16 12.8 Q13.44 15.36 12.16 17.6 Q11.2 19.84 11.84 22.4 Q11.2 20.8 10.56 18.56 Q10.24 16 10.88 13.44 Q10.56 11.2 11.2 8.96 Z"/>
    <!-- Europe/Africa-like shape -->
    <path d="M16.64 8 Q17.92 8.96 18.56 10.88 Q19.2 12.8 18.24 15.36 Q17.6 17.6 17.92 19.84 Q17.28 18.56 16.96 16 Q16.64 13.44 17.28 10.88 Q16.64 9.6 16 8.64 Z"/>
  </g>
  <!-- Specular highlight -->
  <circle cx="16" cy="16" r="14.08" fill="url(#shine)"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14.08" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
</svg>