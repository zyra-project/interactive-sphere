<body>
  <a class="skip-link" href="#sec-1-hero">Skip to main content</a>

  <!-- Sticky presentation timer.
       Minimized by default per docs/POSTER_PLAN.md §0; the
       expanded/collapsed choice is persisted in localStorage. -->
  <div id="pres-timer" class="pres-timer is-minimized" role="region" aria-label="Presentation timer">
    <button type="button" class="pres-timer__expand" aria-label="Expand presentation timer" aria-expanded="false">
      <span aria-hidden="true">⏱</span>
    </button>
    <div class="pres-timer__body">
      <span class="pres-timer__display" aria-live="off">00:00</span>
      <button type="button" class="pres-timer__btn" data-action="play" aria-label="Start timer">▶</button>
      <button type="button" class="pres-timer__btn" data-action="reset" aria-label="Reset timer">⟳</button>
      <button type="button" class="pres-timer__btn" data-action="minimize" aria-label="Minimize timer">–</button>
    </div>
  </div>

  <main id="poster">
